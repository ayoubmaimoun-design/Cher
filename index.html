<!DOCTYPE html>
<html>
<head>

crossorigin="anonymous"></script>

<title>Mon site</title>

</head>

<body style="text-align:center;font-family:Arial">

<h1>موقعي يعمل الآن</h1>

<div id="result">اضغط على اليد</div>

<div class="hand" onclick="clickHand()">
✋ اضغط هنا
</div>

<audio id="clickSound">
<source src="click.mp3" type="audio/mpeg">
</audio>

<script>
let predictions = [
"ستنجح قريباً",
"فرصة جيدة اليوم",
"ركز على هدفك",
"يوم جيد ينتظرك"
];

function clickHand() {
let random = Math.floor(Math.random() * predictions.length);

document.getElementById("result").innerHTML = predictions[random];

document.getElementById("clickSound").play();

// اهتزاز الهاتف
if(navigator.vibrate){
navigator.vibrate(100);
}
}
</script>

</body>
</html>
