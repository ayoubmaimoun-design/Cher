<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Magic Hand</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding-top:50px;
}

.hand{
font-size:120px;
cursor:pointer;
transition:0.3s;
}

.hand:hover{
transform:scale(1.1);
}

.box{
background:#1e293b;
padding:20px;
margin:30px auto;
width:300px;
border-radius:20px;
font-size:22px;
}

button{
background:#38bdf8;
border:none;
padding:12px 25px;
border-radius:10px;
color:white;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🔮 بصمة المستقبل</h1>

<p>
اضغط على بصمة اليد لمعرفة توقعك
</p>

<div class="hand" onclick="predict()">
✋
</div>

<div class="box" id="result">
انتظر التوقع...
</div>

<button onclick="predict()">
توقع جديد
</button>

<script>

function predict(){

let predictions = [

"💰 ستربح شيئًا قريبًا",
"🎮 ستصبح لاعبًا محترفًا",
"🚀 مشروعك سينجح",
"🔥 مفاجأة جميلة بانتظارك",
"📱 ستتعلم مهارة جديدة",
"😄 يوم سعيد يقترب منك",
"⭐ الحظ معك اليوم",
"🎯 هدفك القادم سيتحقق"

];

let random =
Math.floor(Math.random()*predictions.length);

document.getElementById("result")
.innerHTML = predictions[random];

}

</script>

</body>
</html>
